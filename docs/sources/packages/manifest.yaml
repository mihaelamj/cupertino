# Swift Packages source manifest.
# Schema: docs/design/corpus-structure.md §3

sourceId: packages
displayName: Swift Packages
description: |
  Open-source Swift Package Manager packages: GitHub metadata,
  Package.swift contents, READMEs, and source archives for the
  ~10k-package curated catalog. Independent of search.db; lives in
  its own DB (packages.db) so package-search queries don't
  scan apple-documentation rows.

corpusFolder: packages
destinationDB: packages

fetcher:
  kind: github-api
  options:
    rootURL: "https://api.github.com/"
    catalogManifest: "swift-packages-with-stars.json"

indexer:
  fileGlobs:
    - "metadata/**/*.json"
    - "archives/**/*"
  excludes:
    - "**/.git/**"
  # PackagesSource is the one registered source that intentionally
  # does NOT conform to the corpus-structure.md §3 extractor contract
  # ("Must conform to Search.SourceIndexer and be in the source's SPM
  # target"). packages.db is written by the bespoke Indexer.PackagesService
  # (target: IndexerModels) OUTSIDE the SourceProvider abstraction
  # (post-#789). PackagesSource.makeIndexer() returns a private no-op
  # PackagesViewSourceStrategy whose role is to make PackagesSource
  # registrable while routing the actual work elsewhere. Step 3's
  # loader special-cases this source (the only one with a non-Search
  # extractor); see docs/design/corpus-structure.md §3.1 note added
  # in step 2b critic-fix round 1 followup.
  extractor: Indexer.PackagesService

snapshotPolicy:
  staleAfterDays: 14
  refetchOn:
    - schema-bump
    - explicit-recrawl

searchProperties:
  searchQuality: 0.75
  intentDefault: reference
  rankWeight: 0.7

capabilities:
  searchers:
    - text
    - package-search
  operations:
    - read-by-uri
  metadata:
    hasMinSwiftVersion: true
    hasPackageMetadata: true
