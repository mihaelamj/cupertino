# Swift Book documentation source manifest.
# Schema: docs/design/corpus-structure.md §3
#
# Post #1038/#1093 swift-book owns its own DB (swift-book.db), its
# own fetch surface, and its own corpus folder. It no longer shares
# swift-org's crawl or the retired swift-documentation.db.

sourceId: swift-book
displayName: Swift Book
description: |
  The Swift Programming Language book (docs.swift.org/swift-book/*).
  Universal-text + tutorial-grade code samples; capability matrix is
  a subset of swift-org's plus AST-backed symbols/generics extracted
  from the Book's code fences.

corpusFolder: swift-book
destinationDB: swift-book

# swift-book has its own direct fetch surface rooted at the Swift Book.
fetcher:
  kind: web-crawl
  options:
    rootURL: "https://docs.swift.org/swift-book/"
    requestDelaySeconds: "0.1"

indexer:
  fileGlobs:
    - "swift-book/**/*"
  extractor: Search.SwiftBookStrategy

snapshotPolicy:
  staleAfterDays: 30
  refetchOn:
    - schema-bump

searchProperties:
  searchQuality: 0.92
  intentDefault: reference
  rankWeight: 0.92

capabilities:
  searchers:
    - text
    - symbols
    - generics
  operations:
    - read-by-uri
  metadata:
    hasAvailabilityAttrs: true
