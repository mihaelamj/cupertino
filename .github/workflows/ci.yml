name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changelog-touched:
    name: CHANGELOG updated
    runs-on: ubuntu-latest
    # Cheap PR-level gate (post-2026-05-17 whole-CHANGELOG audit). Runs
    # in parallel with build-and-test so a CHANGELOG miss is surfaced
    # in seconds, not after the 15-min build. Pre-commit runs the same
    # script locally before push; this job is the second net.
    steps:
      - name: Checkout (with history)
        uses: actions/checkout@v4
        with:
          # The script diffs against the PR base; need enough history to
          # resolve `origin/main`. Shallow clones (depth 1) break the diff.
          fetch-depth: 0

      - name: Run check-changelog-touched.sh
        run: |
          # PR runs: diff against the merge base with main.
          # Push runs: diff against the immediate parent (HEAD~1).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.event.pull_request.base.ref }}"
          else
            base="HEAD~1"
          fi
          echo "Checking changelog discipline against $base"
          ./scripts/check-changelog-touched.sh --base="$base"

  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift Version
        run: swift --version

      # #1135: fail fast if any .swift under Sources/ or Tests/ is compiled by
      # no target (SwiftPM silently ignores such files, so their tests never
      # run). Runs before Build so an orphaned test trips CI in seconds.
      - name: Guard against orphaned sources (#1135)
        timeout-minutes: 3
        run: ./scripts/check-orphaned-sources.sh

      - name: Build
        working-directory: Packages
        run: swift build

      - name: Test
        working-directory: Packages
        # Skip every test that hits a real network endpoint. Comprehensive
        # audit of @Test(.tags(.integration)) cases on 2026-05-16 (#686):
        # CI doesn't have stable network access to Apple's CDN / GitHub
        # raw content, and 9 of the last 14 main-branch runs failed from
        # network or timing flakes. Each skip below names the function +
        # the endpoint it would hit; per-test detail is in the
        # alphabetical reference block below the swift test invocation.
        #
        # Tests stay runnable locally (no @Test attribute is changed —
        # the skip is workflow-side only). Local devs with network see
        # full coverage; CI sees only deterministic tests.
        #
        # NOTE: --skip takes a REGEX matching test function names.
        # The pre-#686 entry was `testDownloadRealAppleDocPage` which
        # matched nothing (the test is named `downloadRealAppleDocPage`,
        # no `test` prefix — that's an XCTest convention, not Swift
        # Testing). Fixed below.
        run: |
          swift test \
            --skip downloadRealAppleDocPage \
            --skip fetchSinglePage \
            --skip fetchWithResume \
            --skip fetchSwiftEvolution \
            --skip canonicalizerFollowsRename \
            --skip downloaderCreatesOutputDirectory \
            --skip httpErrorPageDefersAndRetriesSuccessfully \
            --skip crawlerCreatesOutputDirectory \
            --skip crawlerRespectsMaxPages \
            --skip lapackFunctionsURLIsProblematic
        # Endpoint reference for each skip (alphabetical):
        #   canonicalizerFollowsRename — github.com (ResolverPipelineTests; follows redirects)
        #   crawlerCreatesOutputDirectory — developer.apple.com (CrawlerTests + SwiftEvolutionCrawlerTests; 2 tests, same name in different files — regex catches both)
        #   crawlerRespectsMaxPages — developer.apple.com (CrawlerTests)
        #   downloadRealAppleDocPage — developer.apple.com (Crawler.AppleDocs.IntegrationTests; the only skip pre-#686, target name was wrong)
        #   downloaderCreatesOutputDirectory — Apple sample-code zip download (SampleCodeDownloaderTests)
        #   fetchSinglePage — developer.apple.com (CrawlTests)
        #   fetchSwiftEvolution — github.com/swiftlang/swift-evolution (CrawlTests; added in #685, recurring `invalidResponse` flake)
        #   fetchWithResume — developer.apple.com + on-disk resume state (CrawlTests)
        #   httpErrorPageDefersAndRetriesSuccessfully — real HTTP error pages (RetryQueueTests)
        #   lapackFunctionsURLIsProblematic — developer.apple.com (CrawlerTests; the curiosity URL)

  package-audits:
    name: Package import audits
    runs-on: ubuntu-latest
    # Cheap PR-level gate (added by #908 / epic #893 pre-flight). Both
    # audit scripts are pure bash, no Swift required, run in seconds.
    # Catches foundation-only and producer-purity violations as early
    # as possible so the 15-min build-and-test job doesn't have to.
    #
    # Pre-commit already runs `check-package-purity.sh` locally
    # (`.pre-commit-config.yaml`); `check-target-foundation-only.sh`
    # has no pre-commit hook yet, so this CI job is the FIRST gate
    # for the foundation-only rule and the SECOND gate for the
    # purity rule. Extending pre-commit to invoke both scripts is a
    # follow-up.
    steps:
      - name: Checkout
        # Default shallow clone is fine: neither script invokes git.
        uses: actions/checkout@v4

      - name: Run check-target-foundation-only.sh
        timeout-minutes: 2
        run: ./scripts/check-target-foundation-only.sh

      - name: Run check-package-purity.sh
        timeout-minutes: 2
        run: ./scripts/check-package-purity.sh

      - name: Run check-import-contract-coverage.sh
        timeout-minutes: 2
        run: ./scripts/check-import-contract-coverage.sh

      # #1295 supply-chain guard (born from PR #1294). Pure text inspection of
      # Package.swift + both Package.resolved files: no build, no network, no
      # code execution, so it is safe to run on an untrusted external PR. Fails
      # if any dependency points at a non-allowlisted owner (e.g. a fork) or if
      # the two lockfiles disagree on a shared dependency's location.
      - name: Run check-dependency-integrity.sh
        timeout-minutes: 2
        run: ./scripts/check-dependency-integrity.sh

      - name: Install yq (required by check-source-manifests.sh)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run check-source-manifests.sh
        timeout-minutes: 2
        run: ./scripts/check-source-manifests.sh

  # The `Standalone-portability proof` job was moved to its own manual-only
  # workflow (`.github/workflows/portability.yml`, `workflow_dispatch`). It
  # builds ~15 lifted targets on macos-15 (10x billing) and gave no signal
  # on the typical PR that does not touch a package boundary, so it is no
  # longer part of the per-PR gate. Trigger it from the Actions tab when a
  # change touches package boundaries, or run `scripts/check-target-portability.sh`
  # locally. The `package-audits` job below still runs the cheap source-level
  # import audits on every PR.

  query-batteries-smoke:
    name: Query batteries smoke
    # TEMPORARILY DISABLED (2026-05-30): this job runs `cupertino setup`,
    # which downloads a compiled DB bundle and expects `apple-documentation.db`
    # in it. After the per-source DB split (#1036) no bundle with the
    # per-source DBs has been published yet, so `setup` fails with
    # "Expected file not found after extraction: apple-documentation.db" on
    # every branch (develop included) — it is infrastructure-not-ready, not a
    # code regression. Re-enable (delete the `if: false`) once the new
    # per-source DB bundle ships to cupertino-docs Releases (#1071 chain).
    if: false
    runs-on: macos-15
    # Per `docs/audits/eval-harness-standard-v1.0.md` § 5.1. Runs every
    # phase harness (`scripts/eval/search-quality-phase*.py`) with the
    # `--smoke` flag (1 fixture per phase, total wall-time budget < 30s
    # not counting build). Full runs are reserved for tagged releases
    # because Phase 1 alone is ~5 minutes wall-time.
    #
    # The dev binary auto-isolates to `~/.cupertino-dev/` via the
    # bundled `cupertino.config.json` per `make build-release`. The
    # smoke step relies on the dev base dir being seeded with the
    # bundle; in CI this is a no-op because we use `cupertino setup`
    # against the v1.2.x bundle URL.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build release binary
        working-directory: Packages
        run: make build-release

      - name: Setup cupertino-dev DB
        run: Packages/.build/release/cupertino setup

      - name: "Smoke: Phase 1 (search canonical-lookup)"
        timeout-minutes: 2
        run: |
          python3 scripts/eval/search-quality-phase1.py \
            --binary Packages/.build/release/cupertino \
            --search-db ~/.cupertino-dev/search.db \
            --label smoke --version smoke \
            --smoke --strict

      - name: "Smoke: Phase 2 (AST tools via MCP stdio)"
        timeout-minutes: 2
        run: |
          python3 scripts/eval/search-quality-phase2.py \
            --binary Packages/.build/release/cupertino \
            --search-db ~/.cupertino-dev/search.db \
            --label smoke --version smoke \
            --smoke --strict

      - name: "Smoke: Phase 3 (inheritance)"
        timeout-minutes: 2
        run: |
          python3 scripts/eval/search-quality-phase3.py \
            --binary Packages/.build/release/cupertino \
            --search-db ~/.cupertino-dev/search.db \
            --label smoke --version smoke \
            --smoke --strict

      - name: "Smoke: Phase 4 (read commands)"
        timeout-minutes: 2
        run: |
          python3 scripts/eval/search-quality-phase4.py \
            --binary Packages/.build/release/cupertino \
            --search-db ~/.cupertino-dev/search.db \
            --label smoke --version smoke \
            --smoke --strict

      - name: "Smoke: Phase 5 (list / doctor / package-search)"
        timeout-minutes: 2
        run: |
          python3 scripts/eval/search-quality-phase5.py \
            --binary Packages/.build/release/cupertino \
            --search-db ~/.cupertino-dev/search.db \
            --label smoke --version smoke \
            --smoke --strict

      - name: "Smoke: CLI surface (version, doctor, search, read, list-frameworks, inheritance)"
        timeout-minutes: 2
        env:
          CUPERTINO_BINARY: Packages/.build/release/cupertino
        run: bash scripts/eval/cli-smoke.sh

      - name: "Smoke: MCP protocol surface (initialize + tools/list + 5 tools/call shapes)"
        timeout-minutes: 3
        env:
          CUPERTINO_BINARY: Packages/.build/release/cupertino
        run: bash scripts/eval/mcp-smoke.sh

      - name: "Smoke: mock-ai-agent end-to-end demo (closes #1004)"
        timeout-minutes: 3
        env:
          CUPERTINO_BINARY: Packages/.build/release/cupertino
          MOCK_AI_AGENT_BINARY: Packages/.build/release/mock-ai-agent
        run: |
          xcrun swift build --package-path Packages -c release --product mock-ai-agent
          bash scripts/eval/mock-ai-agent-smoke.sh
