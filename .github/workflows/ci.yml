name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift Version
        run: swift --version

      - name: Build
        working-directory: Packages
        run: swift build

      - name: Test
        working-directory: Packages
        # --skip targets recurring CI-flaky tests that hit real network
        # endpoints. Keep these as @Test(.tags(.integration)) cases for
        # local runs; CI does not have stable network access to Apple's
        # CDN / GitHub raw content. Each entry needs a brief justification
        # comment so future maintainers know why it's here:
        #   testDownloadRealAppleDocPage: live GET against developer.apple.com
        #   fetchSwiftEvolution: live GET against github.com/swiftlang/swift-evolution
        #     (recurring "Caught error: invalidResponse" — see audit on 2026-05-16)
        run: |
          swift test \
            --skip testDownloadRealAppleDocPage \
            --skip fetchSwiftEvolution
